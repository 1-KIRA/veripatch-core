services:
  veripatch-hub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: veripatch_orchestrator
    ports:
      - "8080:8080"
    volumes:
      - veripatch_db_data:/app/data
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      # AWS Fargate will replace this with your actual RDS cluster link.
      # For now, it defaults gracefully to fallback parameters.
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/veripatch.db}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_OWNER=${GITHUB_OWNER}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - TRIVY_AUTH_TOKEN=${TRIVY_AUTH_TOKEN}
    restart: unless-stopped

volumes:
  veripatch_db_data:
    driver: local